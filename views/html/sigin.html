<!DOCTYPE html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="../../static/css/sigin.css">
  </head>

  <body>
    <a href="login.html" class="btn-entrar">Entrar</a>

    <main class="container">
      <h1>Crie sua conta</h1>

      <form>
        <input type="text" placeholder="Nome completo">
        <input type="text" placeholder="CPF">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Cargo na empresa">
        <input type="password" placeholder="Senha">
        <input type="password" placeholder="Confirmação de senha">

        <button class="btn-criar" type="submit">Criar</button>

        <a href="login.html" class="link-conta">Já tenho conta</a>
      </form>
    </main>
  </body>

</html>

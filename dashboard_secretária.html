<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Secretaria</title>
    <link rel="stylesheet" href="dashboard_secretaria.css">
</head>
<body>

    <div class="top-bar"></div>

    <main class="container">

        <section class="perfil">
            <div class="foto-area">
                <div class="foto">
                    <div class="nuvem"></div>
                    <div class="montanha"></div>
                </div>

                <button class="editar-foto" onclick="abrirModalPerfil()">✎</button>
            </div>

            <div class="dados">
                <h1 id="nomeUsuario">Nome</h1>
                <p id="cargoUsuario">Cargo na empresa</p>
                <p id="setorUsuario">Secretaria</p>
                <p id="idUsuario">#id.de.conta</p>
            </div>
        </section>

        <section class="listas">

            <div class="bloco">
                <div class="cabecalho-lista">
                    <h2>Pacientes</h2>
                    <input type="text" id="buscarPaciente" placeholder="Procurar pacientes" oninput="filtrarPacientes()">
                    <button onclick="adicionarPaciente()">Adicionar</button>
                </div>

                <div class="caixa-lista" id="listaPacientes">
                    <div class="item">
                        <span>João Silva <small>| #001</small></span>
                        <em>09/06/2026</em>
                        <button onclick="removerItem(this)">X</button>
                    </div>
                </div>
            </div>

            <div class="bloco">
                <div class="cabecalho-lista">
                    <h2>Profissionais</h2>
                    <input type="text" id="buscarProfissional" placeholder="Procurar profissional" oninput="filtrarProfissionais()">
                    <button onclick="adicionarProfissional()">Adicionar</button>
                </div>

                <div class="caixa-lista" id="listaProfissionais">
                    <div class="item">
                        <span>Dra. Ana Lima <small>| #101</small></span>
                        <em>08/06/2026</em>
                        <button onclick="removerItem(this)">X</button>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <div class="modal" id="modalPerfil">
        <div class="modal-conteudo">
            <h2>Editar perfil</h2>

            <label>Nome</label>
            <input type="text" id="novoNome">

            <label>Cargo</label>
            <input type="text" id="novoCargo">

            <label>Setor</label>
            <input type="text" id="novoSetor">

            <div class="botoes-modal">
                <button onclick="salvarPerfil()">Salvar</button>
                <button onclick="fecharModalPerfil()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="dashboard_paciente.js"></script>
</body>
</html>
